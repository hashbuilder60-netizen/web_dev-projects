<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="description" content="Dynamic blog homepage with search, category filtering, and editorial card layout." />
  <meta name="theme-color" content="#1f8a70" />
  <meta property="og:title" content="Dev Journal Pro" />
  <meta property="og:description" content="Dynamic blog homepage with search, category filtering, and editorial card layout." />
  <meta property="og:type" content="website" />
  <title>Dev Journal Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <header>
    <h1>Dev Journal</h1>
    <p>Design, code, and product strategy.</p>
    <div class="toolbar">
      <input aria-label="Search posts" id="search" type="search" placeholder="Search posts" />
      <select aria-label="Filter category" id="category">
        <option value="all">All</option>
        <option value="css">CSS</option>
        <option value="javascript">JavaScript</option>
        <option value="career">Career</option>
        <option value="product">Product</option>
      </select>
    </div>
  </header>

  <main id="posts" class="grid"></main>
  <p id="empty" class="empty">No posts match your filters.</p>

  <script src="script.js"></script>
</body>
</html>
