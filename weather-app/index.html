<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Weather Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <main class="card">
    <h1>Weather Pro</h1>
    <p>Live weather + 3-day forecast.</p>

    <form id="f" class="row">
      <input id="city" placeholder="Enter city" required/>
      <button>Search</button>
    </form>

    <div class="controls">
      <button id="use-location" type="button" class="ghost">Use my location</button>
      <label><input id="unit" type="checkbox"/> Fahrenheit</label>
    </div>

    <section id="current" class="panel"></section>
    <section id="forecast" class="forecast"></section>
  </main>
  <script src="script.js"></script>
</body>
</html>
