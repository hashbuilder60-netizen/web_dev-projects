<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Weather dashboard inspired by modern weather platforms with current conditions, hourly trend, and multi-day outlook." />
  <meta name="theme-color" content="#1f8a70" />
  <meta property="og:title" content="Weather Pro" />
  <meta property="og:description" content="City and geolocation weather with temperature units, hourly cards, and 5-day forecast." />
  <meta property="og:type" content="website" />
  <title>Weather Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <main class="card">
    <header class="head">
      <h1>Weather Pro</h1>
      <label><input id="unit" type="checkbox"/> Fahrenheit</label>
    </header>

    <form id="f" class="row">
      <input aria-label="City name" id="city" placeholder="Enter city" required/>
      <button type="submit">Search</button>
      <button id="use-location" type="button" class="ghost">Use location</button>
    </form>

    <section id="current" class="panel" role="status" aria-live="polite"></section>

    <section class="panel">
      <h2>Next Hours</h2>
      <div id="hourly" class="hourly"></div>
    </section>

    <section class="panel">
      <h2>5-Day Forecast</h2>
      <div id="forecast" class="forecast" aria-label="5 day forecast"></div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
