<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="description" content="Weather dashboard with city lookup, geolocation, unit toggle, and 3-day forecast." />
  <meta name="theme-color" content="#1f8a70" />
  <meta property="og:title" content="Weather Pro" />
  <meta property="og:description" content="Weather dashboard with city lookup, geolocation, unit toggle, and 3-day forecast." />
  <meta property="og:type" content="website" />
  <title>Weather Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <main class="card">
    <h1>Weather Pro</h1>
    <p>Live weather + 3-day forecast.</p>

    <form id="f" class="row">
      <input aria-label="City name" id="city" placeholder="Enter city" required/>
      <button type="submit">Search</button>
    </form>

    <div class="controls">
      <button id="use-location" type="button" class="ghost">Use my location</button>
      <label><input id="unit" type="checkbox"/> Fahrenheit</label>
    </div>

    <section id="current" class="panel" role="status" aria-live="polite"></section>
    <section id="forecast" class="forecast" aria-label="3 day forecast"></section>
  </main>
  <script src="script.js"></script>
</body>
</html>
