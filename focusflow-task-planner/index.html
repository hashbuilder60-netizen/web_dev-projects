<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FocusFlow Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <header>
      <h1>FocusFlow Pro</h1>
      <p>Priority planning with real progress tracking.</p>
    </header>

    <section class="panel">
      <form id="task-form" class="grid">
        <input id="task-input" type="text" placeholder="Task title" maxlength="120" required />
        <input id="task-date" type="date" />
        <select id="task-priority">
          <option value="high">High</option>
          <option value="medium" selected>Medium</option>
          <option value="low">Low</option>
        </select>
        <button type="submit">Add Task</button>
      </form>
    </section>

    <section class="panel controls">
      <input id="search" type="search" placeholder="Search tasks" />
      <select id="status-filter">
        <option value="all">All</option>
        <option value="active">Active</option>
        <option value="done">Done</option>
      </select>
      <select id="sort-by">
        <option value="created">Sort: Newest</option>
        <option value="priority">Sort: Priority</option>
        <option value="due">Sort: Due Date</option>
      </select>
      <button id="clear-completed" class="ghost" type="button">Clear Completed</button>
    </section>

    <section class="panel">
      <ul id="task-list" class="task-list"></ul>
      <p id="empty" class="empty">No tasks match your filters.</p>
    </section>

    <section class="stats">
      <article><p>Total</p><strong id="total">0</strong></article>
      <article><p>Completed</p><strong id="completed">0</strong></article>
      <article><p>Overdue</p><strong id="overdue">0</strong></article>
      <article><p>Progress</p><strong id="progress">0%</strong></article>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
