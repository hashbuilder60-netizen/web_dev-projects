<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FocusFlow Task Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <header class="hero">
      <p class="badge">Pro Productivity UI</p>
      <h1>FocusFlow</h1>
      <p>Plan tasks, track progress, and keep momentum every day.</p>
    </header>

    <section class="panel">
      <h2>Add Task</h2>
      <form id="task-form" class="task-form">
        <input id="task-input" type="text" placeholder="What needs to be done?" maxlength="120" required />
        <button type="submit">Add</button>
      </form>
    </section>

    <section class="panel">
      <div class="head">
        <h2>Today's Tasks</h2>
        <button id="clear-completed" class="ghost" type="button">Clear Completed</button>
      </div>
      <ul id="task-list" class="task-list"></ul>
      <p id="empty-state" class="empty">No tasks yet. Add your first one.</p>
    </section>

    <section class="stats">
      <article><p>Total</p><strong id="total-count">0</strong></article>
      <article><p>Completed</p><strong id="done-count">0</strong></article>
      <article><p>Progress</p><strong id="progress-count">0%</strong></article>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
