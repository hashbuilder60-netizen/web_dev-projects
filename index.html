<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>web_dev-projects</title>
  <style>
    :root { --bg:#f2f6f8; --ink:#1f2d3c; --muted:#60748b; --brand:#1f8a70; --card:#fff; --shadow:0 12px 30px rgba(20,40,60,.12); }
    * { box-sizing: border-box; }
    body { margin:0; font-family:"Manrope", "Segoe UI", sans-serif; color:var(--ink); background:radial-gradient(circle at 85% 8%,#ffe7dc 0%,transparent 35%),radial-gradient(circle at 10% 10%,#d9f4eb 0%,transparent 35%),var(--bg); }
    main { width:min(1080px,92%); margin:2.6rem auto 3rem; }
    h1 { margin:0; font-size:clamp(2rem,5vw,3rem); }
    p.lead { color:var(--muted); }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:.9rem; margin-top:1.1rem; }
    .card { background:var(--card); border-radius:16px; padding:1rem; box-shadow:var(--shadow); }
    .card h2 { margin:.1rem 0 .5rem; font-size:1.1rem; }
    .card a { text-decoration:none; color:var(--brand); font-weight:800; }
  </style>
</head>
<body>
  <main>
    <h1>web_dev-projects</h1>
    <p class="lead">A branded collection of frontend mini-projects.</p>
    <section class="grid">
      <article class="card"><h2>FocusFlow Task Planner</h2><a href="./focusflow-task-planner/">Open</a></article>
      <article class="card"><h2>Landing Page Starter</h2><a href="./landing-page-starter/">Open</a></article>
      <article class="card"><h2>Portfolio Website</h2><a href="./portfolio-website/">Open</a></article>
      <article class="card"><h2>E-commerce Product Page</h2><a href="./ecommerce-product-page/">Open</a></article>
      <article class="card"><h2>Blog Homepage</h2><a href="./blog-homepage/">Open</a></article>
      <article class="card"><h2>Weather App</h2><a href="./weather-app/">Open</a></article>
      <article class="card"><h2>Quiz App</h2><a href="./quiz-app/">Open</a></article>
    </section>
  </main>
</body>
</html>
