<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>web_dev-projects</title>
  <style>
    :root { --bg:#f7f6ef; --ink:#1f2b3a; --card:#ffffff; --accent:#006d77; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: "Segoe UI", sans-serif; background:linear-gradient(140deg,#f7f6ef,#eef6f7); color:var(--ink); }
    main { width:min(980px,92%); margin:50px auto; }
    h1 { font-size:clamp(2rem,5vw,3rem); margin:0 0 10px; }
    p { color:#4b5b70; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:16px; margin-top:24px; }
    .card { background:var(--card); border-radius:16px; padding:18px; box-shadow:0 12px 30px rgba(20,30,40,.1); }
    .card a { text-decoration:none; color:var(--accent); font-weight:700; }
  </style>
</head>
<body>
  <main>
    <h1>web_dev-projects</h1>
    <p>Small frontend projects by hashbuilder60-netizen.</p>
    <section class="grid">
      <article class="card">
        <h2>FocusFlow Task Planner</h2>
        <p>Track daily tasks with progress stats and localStorage persistence.</p>
        <a href="./focusflow-task-planner/">Open project</a>
      </article>
      <article class="card">
        <h2>Landing Page Starter</h2>
        <p>A responsive hero + feature section starter for web builds.</p>
        <a href="./landing-page-starter/">Open project</a>
      </article>
    </section>
  </main>
</body>
</html>
